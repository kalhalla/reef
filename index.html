<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a3d4a" />
    <title>REEF</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a3d4a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #e8f4f8;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        outline: none;
      }
      #hint {
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 16px;
        font-size: 12px;
        letter-spacing: 0.6px;
        text-transform: lowercase;
        background: rgba(0, 0, 0, 0.22);
        border-radius: 999px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        pointer-events: none;
        opacity: 0.65;
        transition: opacity 0.6s ease;
      }
      #hint.faded {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hint">tap the seabed to plant coral</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
